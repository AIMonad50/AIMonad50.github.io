<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>やまと屋｜愛の旬メシハック</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Hiragino Sans','Hiragino Kaku Gothic ProN','Noto Sans JP',sans-serif;background:#fafaf8;color:#333;}
.page{max-width:480px;margin:0 auto;padding-bottom:3rem;}
.header{padding:2rem 1.25rem 1rem;text-align:center;}
.header-tag{font-size:11px;padding:3px 12px;border-radius:20px;background:#fff3e0;color:#a0522d;border:0.5px solid #e0a060;font-weight:500;display:inline-block;margin-bottom:0.75rem;}
.header-title{font-size:24px;font-weight:700;color:#222;line-height:1.3;}
.header-sub{font-size:13px;color:#888;margin-top:6px;}
.divider{height:1px;background:#eee;margin:0 1.25rem;}
.section-label{font-size:11px;font-weight:600;color:#888;letter-spacing:.08em;padding:1.25rem 1.25rem 0.75rem;}
.recipe-list{display:flex;flex-direction:column;gap:12px;padding:0 1.25rem;}
.recipe-card{display:flex;gap:12px;align-items:center;background:#fff;border:0.5px solid #eee;border-radius:12px;padding:0.875rem 1rem;text-decoration:none;color:inherit;}
.recipe-card:hover{border-color:#e0a060;}
.recipe-thumb{width:64px;height:64px;min-width:64px;border-radius:8px;object-fit:cover;background:#f5f0e8;}
.recipe-info{flex:1;}
.recipe-tag{font-size:10px;padding:2px 8px;border-radius:10px;background:#e8f5e9;color:#2e7d32;border:0.5px solid #a5d6a7;font-weight:500;display:inline-block;margin-bottom:4px;}
.recipe-name{font-size:14px;font-weight:600;color:#222;line-height:1.4;}
.recipe-meta{font-size:12px;color:#888;margin-top:3px;}
.recipe-arrow{font-size:16px;color:#ccc;}
.brand-footer{margin:2rem 1.25rem 0;padding:1rem 1.25rem;border:1px solid #eee;border-radius:12px;text-align:center;background:#fff;}
.brand-name{font-size:16px;font-weight:700;color:#333;}
.brand-sub{font-size:11px;color:#888;margin-top:4px;}
</style>
</head>
<body>
<div class="page">
  <div class="header">
    <span class="header-tag">やまと屋・爆速旬ハック</span>
    <h1 class="header-title">愛の「旬メシ」<br>レシピ集</h1>
    <p class="header-sub">5分で作れる、冷蔵庫の旬をハックするレシピ</p>
  </div>
  <div class="divider"></div>
  <p class="section-label">TODAY'S RECIPES</p>
  <div class="recipe-list">
    <a class="recipe-card" href="index_tamagoyaki.html">
      <img class="recipe-thumb" src="tamagoyaki.jpg" alt="だし巻かず玉子">
      <div class="recipe-info">
        <span class="recipe-tag">悪魔のおつまみ</span>
        <p class="recipe-name">のび〜るだし巻かず玉子</p>
        <p class="recipe-meta">調理5分・1人分</p>
      </div>
      <span class="recipe-arrow">›</span>
    </a>
    <a class="recipe-card" href="kyuri.html">
      <img class="recipe-thumb" src="kyuri.jpg" alt="きゅうりサラダ">
      <div class="recipe-info">
        <span class="recipe-tag">サラダ</span>
        <p class="recipe-name">きゅうりの柚子胡椒リボンサラダ</p>
        <p class="recipe-meta">調理5分・2〜3人分</p>
      </div>
      <span class="recipe-arrow">›</span>
    </a>
    <a class="recipe-card" href="harugiku.html">
      <img class="recipe-thumb" src="harugiku.jpg" alt="春菊チーズ">
      <div class="recipe-info">
        <span class="recipe-tag">悪魔のおつまみ</span>
        <p class="recipe-name">春菊と生ハムのカリカリチーズ</p>
        <p class="recipe-meta">調理5分・2人分</p>
      </div>
      <span class="recipe-arrow">›</span>
    </a>
    <a class="recipe-card" href="carrot.html">
      <img class="recipe-thumb" src="carrot.jpg" alt="ローストキャロット">
      <div class="recipe-info">
        <span class="recipe-tag">野菜おつまみ</span>
        <p class="recipe-name">ペロリ丸ごとローストキャロット</p>
        <p class="recipe-meta">調理10分・2人分</p>
      </div>
      <span class="recipe-arrow">›</span>
    </a>
    <a class="recipe-card" href="zucchini.html">
      <img class="recipe-thumb" src="zucchini.jpg" alt="ズッキーニサラダ">
      <div class="recipe-info">
        <span class="recipe-tag">サラダ</span>
        <p class="recipe-name">出来立てはシャキッ！ズッキーニのサラダ</p>
        <p class="recipe-meta">調理10分・2〜3人分</p>
      </div>
      <span class="recipe-arrow">›</span>
    </a>
  </div>
  <div class="brand-footer">
    <p class="brand-name">やまと屋</p>
    <p class="brand-sub">旬の食材で、今夜も小さな成功体験を。</p>
  </div>
</div>
</body>
</html>
